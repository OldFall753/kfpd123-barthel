<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>康复功能评定平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#f0f4f8;min-height:100vh;display:flex}
.sidebar{width:245px;background:linear-gradient(180deg,#1a365d 0%,#1e4d6e 100%);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:1000;transition:transform .3s}
.sidebar-header{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.1);text-align:center}
.sidebar-header .logo-icon{font-size:28px;display:block;margin-bottom:2px}
.sidebar-header h2{font-size:15px;font-weight:600;letter-spacing:.5px}
.sidebar-nav{flex:1;padding:8px 8px;overflow-y:auto}
.sidebar-nav::-webkit-scrollbar{width:3px}
.sidebar-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.nav-group-label{font-size:11px;text-transform:uppercase;color:rgba(255,255,255,.4);padding:10px 10px 3px;letter-spacing:1px;font-weight:700;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:6px;cursor:pointer;transition:all .2s;font-size:14px;line-height:1.4;color:rgba(255,255,255,.7);border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-item.active{background:rgba(255,255,255,.18);color:#fff;font-weight:500}
.nav-item .nav-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.nav-item .nav-badge{margin-left:auto;background:rgba(255,255,255,.1);font-size:10px;padding:1px 7px;border-radius:6px;flex-shrink:0}
.sidebar-footer{padding:10px 14px;border-top:1px solid rgba(255,255,255,.06);font-size:9px;color:rgba(255,255,255,.25);text-align:center}
.menu-toggle{display:none;position:fixed;top:8px;left:8px;z-index:1100;width:34px;height:34px;border:none;border-radius:8px;background:#1a365d;color:#fff;font-size:16px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.15);align-items:center;justify-content:center}
.sidebar-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:999}
.main-content{margin-left:245px;flex:1;min-height:100vh;padding:20px 28px;transition:margin-left .3s}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid #e8edf2}
.topbar .page-title{font-size:18px;font-weight:700;color:#1a365d}
.topbar .page-status{font-size:11px;color:#888;background:#f5f7fa;padding:4px 10px;border-radius:14px}
.page{display:none;animation:fadeUp .3s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.section-intro{background:linear-gradient(135deg,#e8f4fd,#dbeafe);border-radius:10px;padding:14px 18px;margin-bottom:16px;border-left:4px solid #3b82f6}
.section-intro h3{font-size:14px;color:#1e4d6e;margin-bottom:3px}
.section-intro p{font-size:12px;color:#4b6a8a;line-height:1.5}
.question-card{background:#fff;border-radius:10px;padding:12px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04);border:2px solid transparent;transition:all .2s}
.question-card:hover{border-color:#e2e8f0}
.question-card.answered{border-color:#bfdbfe;background:#f8faff}
.question-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
.question-header .q-num{width:24px;height:24px;border-radius:5px;background:#1a365d;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.question-header .q-text{flex:1;font-size:14px;font-weight:600;color:#1a1a2e;padding-top:2px}
.question-header .q-icon{font-size:16px;flex-shrink:0}
.options-group{display:flex;flex-direction:column;gap:3px;padding-left:32px}
.option-item{display:flex;align-items:center;padding:6px 10px;border-radius:6px;cursor:pointer;transition:all .2s;user-select:none;border:1.5px solid transparent;font-size:12px}
.option-item:hover{background:#f0f7ff;border-color:#dbeafe}
.option-item input[type=\"radio\"]{display:none}
.option-item .custom-radio{width:18px;height:18px;border:2px solid #d9d9d9;border-radius:50%;margin-right:8px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.option-item input:checked+.custom-radio{border-color:#2563eb;background:#2563eb}

.option-item .option-text{font-size:12px;color:#333;flex:1}
.option-item .option-score{font-size:11px;color:#888;font-weight:500}
.option-item.selected{background:#eff6ff;border-color:#93c5fd}
.option-item.selected .option-text{color:#1e4d6e;font-weight:500}
.option-item.selected .option-score{color:#2563eb;font-weight:600}
.input-group{display:flex;align-items:center;gap:8px;padding-left:32px;flex-wrap:wrap}
.input-group label{font-size:12px;color:#555}
.input-group input[type=\"number\"]{width:90px;padding:6px 8px;border:2px solid #d9d9d9;border-radius:6px;font-size:14px;outline:none;transition:border-color .2s}
.input-group input[type=\"number\"]:focus{border-color:#2563eb}
.input-group .input-score{font-size:13px;font-weight:600;color:#2563eb;min-width:50px;text-align:right}
.input-group .input-hint{font-size:11px;color:#aaa}
.bottom-bar{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:14px;border-top:1px solid #e8edf2}
.bottom-bar .progress-text{font-size:12px;color:#888}
.bottom-bar .progress-text strong{color:#1a365d}
.btn{padding:8px 20px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .25s}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8;transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,.3)}
.btn-primary:disabled{background:#93c5fd;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{background:#f1f5f9;color:#475569}
.btn-secondary:hover{background:#e2e8f0}
.btn-success{background:#16a34a;color:#fff}
.btn-success:hover{background:#15803d}
.btn-outline{background:transparent;color:#2563eb;border:2px solid #2563eb}
.btn-outline:hover{background:#eff6ff}
.result-hero{background:linear-gradient(135deg,#1a365d,#1e4d6e);border-radius:14px;padding:24px;text-align:center;color:#fff;margin-bottom:20px}
.result-hero .score-number{font-size:48px;font-weight:800;line-height:1;margin:4px 0}
.result-hero .score-label{font-size:13px;opacity:.8}
.result-hero .score-level{display:inline-block;padding:4px 16px;border-radius:14px;font-size:12px;font-weight:500;margin-top:4px}
.score-level.good{background:#16a34a}.score-level.mid{background:#eab308;color:#1a1a2e}.score-level.warn{background:#f97316}.score-level.bad{background:#ef4444}.score-level.severe{background:#dc2626}
.score-detail-title{font-size:14px;font-weight:600;color:#1a365d;margin-bottom:10px}
.score-table{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);margin-bottom:18px}
.score-row{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid #f1f5f9}
.score-row:last-child{border-bottom:none}
.score-row .sr-index{width:22px;font-size:11px;color:#94a3b8;font-weight:500}
.score-row .sr-icon{font-size:14px;margin-right:8px}
.score-row .sr-name{flex:1;font-size:12px;color:#1a1a2e}
.score-row .sr-score{font-size:12px;font-weight:600;color:#2563eb;min-width:24px;text-align:right}
.score-row .sr-max{font-size:11px;color:#94a3b8;margin-left:2px}
.score-row .sr-bar-bg{width:60px;height:4px;background:#e2e8f0;border-radius:2px;margin-left:10px;overflow:hidden}
.score-row .sr-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#3b82f6,#2563eb);transition:width .6s ease}
.empty-state{text-align:center;padding:40px 16px;color:#94a3b8}
.empty-state .empty-icon{font-size:40px;margin-bottom:8px}
.empty-state p{font-size:13px}
.result-actions{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
@media(max-width:768px){
.sidebar{width:75vw;max-width:280px;transform:translateX(-100%)}
.sidebar.open{transform:translateX(0)}
.sidebar-overlay.show{display:block}
.menu-toggle{display:flex}
.main-content{margin-left:0;padding:14px;padding-top:56px}
.options-group{padding-left:0;margin-top:2px}
.input-group{padding-left:0}
.result-hero .score-number{font-size:36px}
.score-row .sr-bar-bg{width:40px}
.bottom-bar{flex-direction:column;gap:8px;align-items:stretch;text-align:center}
.question-card{padding:10px 12px}
}
</style>
</head>
<body>
<button class="menu-toggle" id="menuToggle" onclick="toggleS()">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleS()"></div>
<nav class="sidebar" id="sidebar">
<div class="sidebar-header"><span class="logo-icon">🏥</span><h2>康复功能<br>评定平台</h2><div class="sub-logo" style="font-size:9px;opacity:.4;margin-top:1px">Rehab Assessment</div></div>
<div class="sidebar-nav" id="sidebarNav"></div>
<div class="sidebar-footer">kfpd123-barthel v3.0</div>
</nav>
<div class="main-content">
<div class="topbar"><span class="page-title" id="topbarTitle">📋 选择评估量表</span><span class="page-status" id="topbarStatus">请从左侧选择</span></div>
<div id="pageContainer"></div>
</div>
<script>
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;').replace(/'/g,'&#39;')}

// ===== 量表分组定义 =====
const GROUPS = [
{id:'PT',label:'PT 物理治疗',scales:['ueda_leg','fugl_leg','berg','asia']},
{id:'OT',label:'OT 作业治疗',scales:['ueda_hand','fugl_arm','hand_func']},
{id:'ST',label:'ST 言语治疗',scales:[]},
{id:'通用',label:'通用量表',scales:['mmse','barthel','sensory','ashworth','mmt','rom']}
];

// ===== 量表数据 =====
const SCALES = {};

// ===== PT量表 =====

SCALES.ueda_leg={id:'ueda_leg',group:'PT',icon:'🦵',name:'上田敏评估量表（下肢）',desc:'上田敏法12级评估 - 下肢运动功能分级。',
sections:[{title:'下肢功能分级',items:[
{icon:'🦵',text:'下肢功能等级（请选择最符合的级别）',opts:[
{t:'0级：无任何运动',s:0},{t:'1级：出现联合反应',s:1},{t:'2级:出现随意共同运动(轻度)',s:2},{t:'3级:随意共同运动(充分)',s:3},{t:'4级:出现分离运动(轻度)',s:4},{t:'5级:分离运动(充分)',s:5},{t:'6级:协调运动接近正常',s:6}]}]}],
calc:function(a){let s=a[1]||0;let lv='';let lc='good';if(s==0){lv='完全瘫痪';lc='severe'}else if(s<=2){lv='重度运动障碍';lc='bad'}else if(s<=4){lv='中度运动障碍';lc='warn'}else if(s==5){lv='轻度运动障碍';lc='mid'}else{lv='基本正常';lc='good'}return{total:s,max:6,level:lv+' ('+s+'级)',lvlClass:lc,detail:[{icon:'🦵',name:'下肢功能等级',score:s,max:6}]}}};

SCALES.fugl_leg={id:'fugl_leg',group:'PT',icon:'🦵',name:'Fugl-Meyer下肢评估量表',desc:'Fugl-Meyer Assessment下肢部分，评估卒中后下肢运动功能。共17项，每项0-2分，总分34分。',
sections:[
{title:'下肢（14项，每项0-2分）',items:[
{icon:'🦵',text:'1. 跟→膝→髋屈曲协同：髋屈曲',opts:[{t:'0分：不能完成',s:0},{t:'1分：部分完成',s:1},{t:'2分：充分完成',s:2}]},
{icon:'🦵',text:'2. 跟→膝→髋屈曲协同：膝屈曲',opts:[{t:'0分：不能完成',s:0},{t:'1分：部分完成',s:1},{t:'2分：充分完成',s:2}]},
{icon:'🦵',text:'3. 跟→膝→髋屈曲协同：踝背屈',opts:[{t:'0分：不能完成',s:0},{t:'1分：部分完成',s:1},{t:'2分：充分完成',s:2}]},
{icon:'🦵',text:'4. 伸展协同：髋伸展',opts:[{t:'0分：不能完成',s:0},{t:'1分：部分完成',s:1},{t:'2分：充分完成',s:2}]},
{icon:'🦵',text:'5. 伸展协同：髋内收',opts:[{t:'0分：不能完成',s:0},{t:'1分：部分完成',s:1},{t:'2分：充分完成',s:2}]},
{icon:'🦵',text:'6. 伸展协同：膝伸展',opts:[{t:'0分：不能完成',s:0},{t:'1分：部分完成',s:1},{t:'2分：充分完成',s:2}]},
{icon:'🦵',text:'7. 伸展协同：踝跖屈',opts:[{t:'0分：不能完成',s:0},{t:'1分：部分完成',s:1},{t:'2分：充分完成',s:2}]},
{icon:'🦵',text:'8. 髋屈曲（坐位，膝屈曲90°）',opts:[{t:'0分：不能',s:0},{t:'1分：部分',s:1},{t:'2分：充分',s:2}]},
{icon:'🦵',text:'9. 膝屈曲（俯卧位，<100°）',opts:[{t:'0分：不能',s:0},{t:'1分：部分',s:1},{t:'2分：充分',s:2}]},
{icon:'🦵',text:'10. 踝背屈（坐位）',opts:[{t:'0分：不能',s:0},{t:'1分：部分',s:1},{t:'2分：充分',s:2}]},
{icon:'🦵',text:'11. 膝屈曲（俯卧位，>100°）',opts:[{t:'0分：不能',s:0},{t:'1分：部分',s:1},{t:'2分：充分',s:2}]},
{icon:'🦵',text:'12. 踝跖屈（坐位）',opts:[{t:'0分：不能',s:0},{t:'1分：部分',s:1},{t:'2分：充分',s:2}]},
{icon:'🦵',text:'13. 仰卧位→膝屈曲>90°',opts:[{t:'0分：不能',s:0},{t:'1分：部分',s:1},{t:'2分：充分',s:2}]},
{icon:'🦵',text:'14. 足跟离地踝跖屈（站立位）',opts:[{t:'0分：不能',s:0},{t:'1分：部分',s:1},{t:'2分：充分',s:2}]}
]},
{title:'协调/速度（3项）',items:[
{icon:'🔄',text:'15. 跟膝胫试验（速度）',opts:[{t:'0分：明显震颤',s:0},{t:'1分：轻度震颤',s:1},{t:'2分：无震颤',s:2}]},
{icon:'🔄',text:'16. 跟膝胫试验（辨距）',opts:[{t:'0分：明显辨距障碍',s:0},{t:'1分：轻度辨距障碍',s:1},{t:'2分：无辨距障碍',s:2}]},
{icon:'⏱️',text:'17. 速度（健侧5次 vs 患侧5次）',opts:[{t:'0分：>健侧6秒',s:0},{t:'1分：慢2-5秒',s:1},{t:'2分：<2秒差异',s:2}]}
]}],
calc:function(a){let t=0,d=[];let idx=0;this.sections.forEach(s=>{s.items.forEach(it=>{idx++;let sc=a[idx]||0;t+=sc;d.push({icon:it.icon,name:it.text,score:sc,max:2})})});let lv,lc;if(t>=30){lv='运动功能良好';lc='good'}else if(t>=22){lv='中度运动障碍';lc='mid'}else if(t>=12){lv='重度运动障碍';lc='warn'}else{lv='极重度运动障碍';lc='severe'}return{total:t,max:34,level:lv,lvlClass:lc,detail:d}}};

SCALES.berg={id:'berg',group:'PT',icon:'⚖️',name:'Berg平衡量表',desc:'Berg Balance Scale (BBS) 评估平衡功能。共14项，每项0-4分，总分56分。分值越高平衡功能越好。',
sections:[{title:'平衡功能评估（14项）',items:[
{icon:'🧍',text:'1. 坐→站起',opts:[{t:'0分：需大量帮助',s:0},{t:'1分：需中度帮助',s:1},{t:'2分：需少量帮助',s:2},{t:'3分：需手扶',s:3},{t:'4分：不需手扶独立完成',s:4}]},
{icon:'🧍',text:'2. 无支撑站立（2分钟）',opts:[{t:'0分：不能站立30秒',s:0},{t:'1分：需多次尝试',s:1},{t:'2分：能站30秒',s:2},{t:'3分：能站2分钟需监督',s:3},{t:'4分：安全站立2分钟',s:4}]},
{icon:'🪑',text:'3. 无支撑坐位（2分钟）',opts:[{t:'0分：不能坐30秒',s:0},{t:'1分：能坐30秒',s:1},{t:'2分：能坐2分钟需监督',s:2},{t:'3分：能坐2分钟但需背靠',s:3},{t:'4分：安全坐2分钟',s:4}]},
{icon:'⬇️',text:'4. 站→坐',opts:[{t:'0分：不能安全坐下',s:0},{t:'1分：需4次以上调整',s:1},{t:'2分：需手扶控制',s:2},{t:'3分：用手扶腿控制下落',s:3},{t:'4分：安全平稳坐下',s:4}]},
{icon:'🔄',text:'5. 转移（床→椅）',opts:[{t:'0分：需2人帮助',s:0},{t:'1分：需1人大量帮助',s:1},{t:'2分：需1人少量帮助',s:2},{t:'3分：需口头提示',s:3},{t:'4分：独立安全转移',s:4}]},
{icon:'👀',text:'6. 闭眼站立（10秒）',opts:[{t:'0分：不能站3秒',s:0},{t:'1分：睁眼能站3秒',s:1},{t:'2分：闭眼能站3秒',s:2},{t:'3分：闭眼站3-10秒',s:3},{t:'4分：安全站10秒',s:4}]},
{icon:'🦶',text:'7. 双脚并拢站立',opts:[{t:'0分：不能并拢',s:0},{t:'1分：需帮助才能并拢',s:1},{t:'2分：能并拢站1分钟需监督',s:2},{t:'3分：自主并拢站1分钟',s:3},{t:'4分：安全并拢站1分钟',s:4}]},
{icon:'🙋',text:'8. 上肢前伸（前屈90°、伸臂）',opts:[{t:'0分：前伸<5cm',s:0},{t:'1分：前伸5-12cm',s:1},{t:'2分：前伸12-20cm',s:2},{t:'3分：前伸>20cm需监督',s:3},{t:'4分：前伸>25cm安全',s:4}]},
{icon:'📥',text:'9. 从地面拾物',opts:[{t:'0分：不能尝试',s:0},{t:'1分：尝试但需帮助',s:1},{t:'2分：需监督才能完成',s:2},{t:'3分：能完成但需口头提示',s:3},{t:'4分：安全独立完成',s:4}]},
{icon:'👀',text:'10. 转身向后看（左+右）',opts:[{t:'0分：不能转身',s:0},{t:'1分：能侧身不能向后',s:1},{t:'2分：向后转但重心不稳',s:2},{t:'3分：转身良好需监督',s:3},{t:'4分：左右转身均良好',s:4}]},
{icon:'🔄',text:'11. 转身360°',opts:[{t:'0分：不能完成',s:0},{t:'1分：需口头提示',s:1},{t:'2分：平稳但慢',s:2},{t:'3分：一侧快速一侧慢',s:3},{t:'4分：4秒内安全完成',s:4}]},
{icon:'🪜',text:'12. 交替踏台阶（各4次）',opts:[{t:'0分：不能尝试',s:0},{t:'1分：需帮助，<2次',s:1},{t:'2分：需少量帮助，4次',s:2},{t:'3分：无需帮助但慢',s:3},{t:'4分：20秒内完成8次',s:4}]},
{icon:'📏',text:'13. 串联站立（足尖对足跟）',opts:[{t:'0分：不能',s:0},{t:'1分：能迈步但需帮助',s:1},{t:'2分：能维持串联姿势',s:2},{t:'3分：能站30秒',s:3},{t:'4分：能站30秒以上',s:4}]},

// ================================================================
//  渲染逻辑
// ================================================================

let currentScale = null;
let answers = {};

function renderSidebar() {
  let html = '';
  GROUPS.forEach(g => {
    html += '<div class="nav-group-label">' + esc(g.label) + '</div>';
    if (g.scales.length === 0) {
      html += '<div class="nav-item" style="opacity:.35;cursor:default;font-size:11px"><span class="nav-icon">⏳</span>暂无量表</div>';
    } else {
      g.scales.forEach(key => {
        const s = SCALES[key];
        if (!s) return;
        html += '<button class="nav-item" onclick="selectScale(\'' + key + '\')" id="nav_' + key + '">' +
          '<span class="nav-icon">' + s.icon + '</span><span>' + esc(s.name) + '</span>' +
          '<span class="nav-badge" id="badge_' + key + '"></span></button>';
      });
    }
  });
  document.getElementById('sidebarNav').innerHTML = html;
}

function selectScale(key) {
  currentScale = key;
  const s = SCALES[key];
  if (!s) return;
  answers[key] = {};
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navEl = document.getElementById('nav_' + key);
  if (navEl) navEl.classList.add('active');
  document.getElementById('topbarTitle').textContent = s.icon + ' ' + s.name;
  document.getElementById('topbarStatus').textContent = GROUPS.find(g => g.scales.includes(key))?.label || '通用';
  renderQuestionPage(s);
  closeS();
}

function renderQuestionPage(s) {
  const container = document.getElementById('pageContainer');
  let totalQ = 0;
  s.sections.forEach(sec => totalQ += sec.items.length);

  let html = '<div class="section-intro"><h3>📌 ' + esc(s.name) + '</h3><p>' + esc(s.desc) + '</p></div>';
  html += '<div id="questionsContainer">';
  let qIdx = 0;
  s.sections.forEach(section => {
    html += '<div style="font-size:13px;font-weight:600;color:#1a365d;margin:14px 0 8px;">' + esc(section.title) + '</div>';
    section.items.forEach(item => {
      qIdx++;
      if (item.input) {
        // 填空模式（ROM专用）
        html += '<div class="question-card" id="card_' + s.id + '_' + qIdx + '">' +
          '<div class="question-header"><span class="q-num">' + qIdx + '</span><span class="q-text">' + esc(item.text) + '</span><span class="q-icon">' + esc(item.icon) + '</span></div>' +
          '<div class="input-group">' +
          '<label>测量值：</label><input type="number" id="input_' + s.id + '_' + qIdx + '" min="0" max="' + item.maxVal + '" step="1" placeholder="输入角度" ' +
          'oninput="handleROMInput(\'' + s.id + '\',' + qIdx + ',this)" ' +
          (answers[s.id] && answers[s.id][qIdx] !== undefined ? 'value="' + (answers[s.id]['rom_'+qIdx+'_val']||'') + '"' : '') + '>' +
          '<span class="input-hint">' + esc(item.unit || '°') + '</span>' +
          '<span class="input-score" id="score_' + s.id + '_' + qIdx + '">' +
          (answers[s.id] && answers[s.id][qIdx] !== undefined ? answers[s.id][qIdx] + '分' : '—') +
          '</span></div></div>';
      } else {
        // 选择题模式
        const optHtml = item.opts.map((opt, oi) =>
          '<label class="option-item" onclick="selectOpt(\'' + s.id + '\',' + qIdx + ',' + opt.s + ',this)">' +
          '<input type="radio" name="q_' + s.id + '_' + qIdx + '" value="' + opt.s + '">' +
          '<span class="custom-radio"></span><span class="option-text">' + esc(opt.t) + '</span>' +
          '<span class="option-score">' + opt.s.toFixed(1) + '分</span></label>'
        ).join('');
        html += '<div class="question-card" id="card_' + s.id + '_' + qIdx + '">' +
          '<div class="question-header"><span class="q-num">' + qIdx + '</span><span class="q-text">' + esc(item.text) + '</span><span class="q-icon">' + esc(item.icon) + '</span></div>' +
          '<div class="options-group">' + optHtml + '</div></div>';
      }
    });
  });
  html += '</div>';
  html += '<div class="bottom-bar"><span class="progress-text" id="progressText">已作答：<strong>0</strong> / <strong>' + totalQ + '</strong> 项</span>' +
    '<button class="btn btn-primary" id="btnSubmit" onclick="submitAssessment()" disabled>✅ 提交评估 →</button></div>';
  container.innerHTML = html;
  document.getElementById('progressText').innerHTML = '已作答：<strong>0</strong> / <strong>' + totalQ + '</strong> 项';
}

// ===== 选择选项 =====
function selectOpt(sId, qIdx, score, labelEl) {
  if (!answers[sId]) answers[sId] = {};
  answers[sId][qIdx] = score;
  const card = labelEl.closest('.question-card');
  card.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
  labelEl.classList.add('selected');
  labelEl.querySelector('input[type="radio"]').checked = true;
  card.classList.add('answered');
  updateProgress(sId);
}

// ===== ROM输入处理 =====
function handleROMInput(sId, qIdx, inputEl) {
  if (!answers[sId]) answers[sId] = {};
  const val = parseFloat(inputEl.value);
  const item = findROMItem(sId, qIdx);
  if (!item) return;
  const scoreEl = document.getElementById('score_' + sId + '_' + qIdx);
  const card = document.getElementById('card_' + sId + '_' + qIdx);
  if (isNaN(val) || val < 0) {
    delete answers[sId][qIdx];
    delete answers[sId]['rom_' + qIdx + '_val'];
    if (scoreEl) scoreEl.textContent = '—';
    if (card) card.classList.remove('answered');
    updateProgress(sId);
    return;
  }
  let sc = 0;
  for (const th of item.thresholds) {
    if (th.min !== undefined && th.max !== undefined) {
      if (val >= th.min && val <= th.max) { sc = th.sc; break; }
    } else if (th.min !== undefined && val >= th.min) { sc = th.sc; break; }
    else if (th.max !== undefined && val <= th.max) { sc = th.sc; break; }
  }
  answers[sId][qIdx] = sc;
  answers[sId]['rom_' + qIdx + '_val'] = val;
  if (scoreEl) scoreEl.textContent = sc + '分';
  if (card) card.classList.add('answered');
  updateProgress(sId);
}

function findROMItem(sId, qIdx) {
  const s = SCALES[sId];
  if (!s) return null;
  let idx = 0;
  for (const sec of s.sections) {
    for (const item of sec.items) {
      idx++;
      if (idx === qIdx) return item;
    }
  }
  return null;
}

function updateProgress(sId) {
  if (!answers[sId]) return;
  const count = Object.keys(answers[sId]).filter(k => !k.startsWith('rom_')).length;
  const total = countTotalQuestions(sId);
  const el = document.getElementById('progressText');
  if (el) el.innerHTML = '已作答：<strong>' + count + '</strong> / <strong>' + total + '</strong> 项';
  const btn = document.getElementById('btnSubmit');
  if (btn) btn.disabled = count < total;
}

function countTotalQuestions(sId) {
  let n = 0;
  const s = SCALES[sId];
  if (!s) return 0;
  s.sections.forEach(sec => n += sec.items.length);
  return n;
}

// ===== 提交评估 =====
function submitAssessment() {
  const s = SCALES[currentScale];
  const ans = answers[currentScale] || {};
  const total = countTotalQuestions(currentScale);
  const answered = Object.keys(ans).filter(k => !k.startsWith('rom_')).length;
  if (answered < total) return;

  const result = s.calc(ans);
  localStorage.setItem('rehab_' + currentScale + '_answers', JSON.stringify(ans));
  localStorage.setItem('rehab_' + currentScale + '_result', JSON.stringify(result));
  renderResultPage(s, result);
}

// ===== 渲染结果 =====
function renderResultPage(s, result) {
  const container = document.getElementById('pageContainer');
  let detailHtml = result.detail.map((d, i) => {
    const pct = d.max > 0 ? (d.score / d.max) * 100 : 0;
    const noteHtml = d.note ? '<span style="font-size:10px;color:#aaa;margin-left:8px">' + esc(d.note) + '</span>' : '';
    return '<div class="score-row"><span class="sr-index">' + (i+1) + '</span><span class="sr-icon">' + d.icon + '</span>' +
      '<span class="sr-name">' + esc(d.name) + noteHtml + '</span><span class="sr-score">' + (Number.isInteger(d.score) ? d.score : d.score.toFixed(1)) + '</span>' +
      '<span class="sr-max">/ ' + d.max + '</span><div class="sr-bar-bg"><div class="sr-bar-fill" style="width:' + pct + '%"></div></div></div>';
  }).join('');

  container.innerHTML =
    '<div class="result-hero"><div class="score-label">' + esc(s.name) + ' · 总分</div><div class="score-number">' + result.total + '</div>' +
    '<div style="font-size:11px;opacity:.7;">/ ' + result.max + ' 分</div><div class="score-level ' + result.lvlClass + '">' + result.level + '</div></div>' +
    '<div class="score-detail-title">📊 各项得分明细</div><div class="score-table">' + detailHtml + '</div>' +
    '<div class="result-actions"><button class="btn btn-outline" onclick="selectScale(\'' + s.id + '\')">← 返回重新评估</button>' +
    '<button class="btn btn-secondary" onclick="location.reload()">📋 切换其他量表</button></div>';

  document.getElementById('topbarStatus').textContent = result.total + '/' + result.max + '分';
  const badge = document.getElementById('badge_' + s.id);
  if (badge) badge.textContent = result.total + '分';
}

// ===== 侧栏控制 =====
function toggleS() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('show'); }
function closeS() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); }

// ===== 初始化 =====
window.addEventListener('DOMContentLoaded', function() {
  renderSidebar();
  const keys = Object.keys(SCALES);
  keys.forEach(key => {
    const saved = localStorage.getItem('rehab_' + key + '_result');
    if (saved) {
      const result = JSON.parse(saved);
      const badge = document.getElementById('badge_' + key);
      if (badge) badge.textContent = result.total + '分';
    }
  });
  if (keys.length > 0) selectScale(keys[0]);
});
</script>
