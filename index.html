<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>康复功能评定平台</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#f0f4f8;min-height:100vh;display:flex}
        .sidebar{width:230px;background:linear-gradient(180deg,#1a365d 0%,#1e4d6e 100%);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:1000;transition:transform .3s}

        .sidebar-header .logo-icon{font-size:30px;display:block;margin-bottom:4px}
        .sidebar-header h2{font-size:14px;font-weight:600;letter-spacing:.5px;line-height:1.3}
        .sidebar-header .sub-logo{font-size:10px;opacity:.5;margin-top:2px}

        .sidebar-nav::-webkit-scrollbar{width:4px}
        .sidebar-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
        .nav-group-label{font-size:10px;text-transform:uppercase;color:rgba(255,255,255,.35);padding:8px 10px 4px;letter-spacing:1px;font-weight:600}

        .menu-toggle{display:none;position:fixed;top:10px;left:10px;z-index:1100;width:38px;height:38px;border:none;border-radius:8px;background:#1a365d;color:#fff;font-size:18px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.15);align-items:center;justify-content:center}

        .page.active{display:block}

        .section-intro p{font-size:13px;color:#4b6a8a;line-height:1.6}

        .question-card.answered{border-color:#bfdbfe;background:#f8faff}
        .question-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
        .question-header .q-num{width:26px;height:26px;border-radius:6px;background:#1a365d;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}

        .question-header .q-icon{font-size:18px;flex-shrink:0}
        .options-group{display:flex;flex-direction:column;gap:4px;padding-left:36px}
        .option-item{display:flex;align-items:center;padding:8px 12px;border-radius:8px;cursor:pointer;transition:all .2s;user-select:none;border:1.5px solid transparent}
        .option-item:hover{background:#f0f7ff;border-color:#dbeafe}
        .option-item input[type="radio"]{display:none}
        .option-item .custom-radio{width:18px;height:18px;border:2px solid #d9d9d9;border-radius:50%;margin-right:10px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
        .option-item input:checked+.custom-radio{border-color:#2563eb;background:#2563eb}
        .option-item input:checked+.custom-radio::after{content:"";width:7px;height:7px;border-radius:50%;background:#fff}
        .option-item .option-text{font-size:13px;color:#333;flex:1}
        .option-item .option-score{font-size:12px;color:#888;font-weight:500}
        .option-item.selected{background:#eff6ff;border-color:#93c5fd}
        .option-item.selected .option-text{color:#1e4d6e;font-weight:500}
        .option-item.selected .option-score{color:#2563eb;font-weight:600}
        .bottom-bar{display:flex;justify-content:space-between;align-items:center;margin-top:22px;padding-top:16px;border-top:1px solid #e8edf2}
        .bottom-bar .progress-text{font-size:13px;color:#888}
        .bottom-bar .progress-text strong{color:#1a365d}
        .btn{padding:10px 24px;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:all .25s}
        .btn-primary{background:#2563eb;color:#fff}
        .btn-primary:hover{background:#1d4ed8;transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,.3)}
        .btn-primary:disabled{background:#93c5fd;cursor:not-allowed;transform:none;box-shadow:none}
        .btn-secondary{background:#f1f5f9;color:#475569}
        .btn-secondary:hover{background:#e2e8f0}
        .btn-success{background:#16a34a;color:#fff}
        .btn-success:hover{background:#15803d;transform:translateY(-1px);box-shadow:0 4px 12px rgba(22,163,74,.3)}
        .btn-outline{background:transparent;color:#2563eb;border:2px solid #2563eb}
        .btn-outline:hover{background:#eff6ff}
        .result-hero{background:linear-gradient(135deg,#1a365d,#1e4d6e);border-radius:14px;padding:28px;text-align:center;color:#fff;margin-bottom:24px}
        .result-hero .score-number{font-size:56px;font-weight:800;line-height:1;margin:6px 0}
        .result-hero .score-label{font-size:14px;opacity:.8}
        .result-hero .score-level{display:inline-block;padding:5px 18px;border-radius:16px;font-size:13px;font-weight:500;margin-top:6px}
        .score-level.good{background:#16a34a}
        .score-level.mid{background:#eab308;color:#1a1a2e}
        .score-level.warn{background:#f97316}
        .score-level.bad{background:#ef4444}
        .score-level.severe{background:#dc2626}
        .score-detail-title{font-size:15px;font-weight:600;color:#1a365d;margin-bottom:12px;display:flex;align-items:center;gap:6px}
        .score-table{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.04);margin-bottom:20px}
        .score-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid #f1f5f9;transition:background .2s}
        .score-row:last-child{border-bottom:none}
        .score-row:hover{background:#f8faff}
        .score-row .sr-index{width:24px;font-size:12px;color:#94a3b8;font-weight:500}
        .score-row .sr-icon{font-size:16px;margin-right:10px}
        .score-row .sr-name{flex:1;font-size:13px;color:#1a1a2e}
        .score-row .sr-score{font-size:13px;font-weight:600;color:#2563eb;min-width:30px;text-align:right}
        .score-row .sr-max{font-size:12px;color:#94a3b8;margin-left:3px}
        .score-row .sr-bar-bg{width:70px;height:5px;background:#e2e8f0;border-radius:3px;margin-left:12px;overflow:hidden}
        .score-row .sr-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#3b82f6,#2563eb);transition:width .6s ease}
        .empty-state{text-align:center;padding:50px 20px;color:#94a3b8}
        .empty-state .empty-icon{font-size:48px;margin-bottom:10px}
        .empty-state p{font-size:14px}
        .result-actions{display:flex;gap:10px;justify-content:center;margin-top:16px}
        @media(max-width:768px){
            .sidebar{transform:translateX(-100%)}
            .sidebar.open{transform:translateX(0)}
            .sidebar-overlay.show{display:block}
            .menu-toggle{display:flex}
            .main-content{margin-left:0;padding:16px;padding-top:56px}
            .options-group{padding-left:0;margin-top:4px}
            .result-hero .score-number{font-size:42px}
            .score-row .sr-bar-bg{width:50px}
            .bottom-bar{flex-direction:column;gap:10px;align-items:stretch;text-align:center}
            .question-card{padding:12px 14px}
        }
    </style>
</head>
<body>
<button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- 侧边导航栏 -->
<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <span class="logo-icon">🏥</span>
        <h2>康复功能<br>评定平台</h2>
        <div class="sub-logo">Rehab Assessment</div>
    </div>
    <div class="sidebar-nav" id="sidebarNav"></div>
    <div class="sidebar-footer">kfpd123-barthel v2.0</div>
</nav>

<!-- 主内容区 -->
<div class="main-content">
    <div class="topbar">
        <span class="page-title" id="topbarTitle">📋 选择评估量表</span>
        <span class="page-status" id="topbarStatus">请从左侧选择</span>
    </div>
    <!-- 动态页面容器 -->
    <div id="pageContainer"></div>
</div>

<script>
// ================================================================
// 评估量表数据
// ================================================================
const SCALES = {
    barthel: {
        id: 'barthel', chapter: 14, icon: '📋', name: '改良Barthel指数',
        desc: '评估患者的日常生活自理能力（ADL）。包含10项评估内容，总分0-100分。',
        sections: [{ title: '评估项目', items: [
            { icon:'🚽', text:'大便控制', opts:[{t:'失禁或昏迷',s:0},{t:'偶尔失禁(<1次/周)',s:5},{t:'能控制',s:10}] },
            { icon:'🚻', text:'小便控制', opts:[{t:'失禁或昏迷',s:0},{t:'偶尔失禁(<1次/天)',s:5},{t:'能控制',s:10}] },
            { icon:'🧼', text:'修饰（洗脸、刷牙、梳头、刮脸）', opts:[{t:'需帮助',s:0},{t:'独立完成',s:5}] },
            { icon:'🚾', text:'如厕（拭净、整理衣裤、冲水）', opts:[{t:'依赖',s:0},{t:'需部分帮助',s:5},{t:'自理',s:10}] },
            { icon:'🍽️', text:'进食', opts:[{t:'依赖',s:0},{t:'需部分帮助',s:5},{t:'自理',s:10}] },
            { icon:'🛏️', text:'转移（床→椅）', opts:[{t:'完全依赖，不能坐',s:0},{t:'需大量帮助(2人)',s:5},{t:'需少量帮助(1人)',s:10},{t:'自理',s:15}] },
            { icon:'🚶', text:'步行（平地45米）', opts:[{t:'不能步行',s:0},{t:'轮椅上独立行动',s:5},{t:'需1人帮助',s:10},{t:'独立步行',s:15}] },
            { icon:'👔', text:'穿衣（系扣、拉链、穿鞋等）', opts:[{t:'依赖',s:0},{t:'需一半帮助',s:5},{t:'自理',s:10}] },
            { icon:'🪜', text:'上下楼梯', opts:[{t:'不能',s:0},{t:'需部分帮助',s:5},{t:'自理',s:10}] },
            { icon:'🛁', text:'洗澡', opts:[{t:'依赖',s:0},{t:'自理',s:5}] }
        ]}],
        calc: function(answers) {
            let total = 0; let detail = [];
            this.sections[0].items.forEach((item,i) => {
                let score = answers[item.text] || 0;
                total += score; detail.push({icon:item.icon, name:item.text, score, max:item.opts[item.opts.length-1].s});
            });
            let level,lvlClass;
            if(total>=80){level='基本自理（轻度依赖）';lvlClass='good'}
            else if(total>=60){level='中度依赖';lvlClass='mid'}
            else if(total>=40){level='重度依赖';lvlClass='warn'}
            else if(total>=20){level='极重度依赖';lvlClass='bad'}
            else{level='完全依赖';lvlClass='severe'}
            return {total, max:100, level, lvlClass, detail};
        }
    },
    cog: {
        id: 'cog', chapter: 5, icon: '🧠', name: '认知功能评定',
        desc: '认知功能筛查，评估定向力、记忆力、注意力和执行功能等方面。',
        sections: [
            { title: '定向力', items: [
                { icon:'📅', text:'时间定向：现在是哪一年？', opts:[{t:'错误',s:0},{t:'正确',s:1}] },
                { icon:'📅', text:'时间定向：现在是几月份？', opts:[{t:'错误',s:0},{t:'正确',s:1}] },
                { icon:'📅', text:'时间定向：今天是几号？', opts:[{t:'错误',s:0},{t:'正确',s:1}] },
                { icon:'📍', text:'地点定向：现在在哪个城市？', opts:[{t:'错误',s:0},{t:'正确',s:1}] },
                { icon:'📍', text:'地点定向：现在在哪个医院/场所？', opts:[{t:'错误',s:0},{t:'正确',s:1}] }
            ]},
            { title: '记忆力', items: [
                { icon:'💭', text:'即刻记忆：说出3个词（皮球、国旗、树木）后请患者重复', opts:[{t:'0个',s:0},{t:'1个',s:1},{t:'2个',s:2},{t:'3个',s:3}] },
                { icon:'💭', text:'延时回忆（3-5分钟后）：回忆刚才的3个词', opts:[{t:'0个',s:0},{t:'1个',s:1},{t:'2个',s:2},{t:'3个',s:3}] }
            ]},
            { title: '注意力与计算力', items: [
                { icon:'🔢', text:'计算：100-7=?（连续减5次）', opts:[{t:'0个正确',s:0},{t:'1-2个正确',s:1},{t:'3-4个正确',s:2},{t:'全部正确',s:3}] }
            ]},
            { title: '语言与执行功能', items: [
                { icon:'🗣️', text:'命名：出示手表、铅笔，请患者说出名称', opts:[{t:'0个正确',s:0},{t:'1个正确',s:1},{t:'2个正确',s:2}] },
                { icon:'🔁', text:'复述：请复述"吃葡萄不吐葡萄皮"', opts:[{t:'不能',s:0},{t:'部分正确',s:1},{t:'完全正确',s:2}] },
                { icon:'📝', text:'执行指令：请按顺序做"用右手拿纸→对折→放在腿上"', opts:[{t:'0步',s:0},{t:'1步',s:1},{t:'2步',s:2},{t:'3步',s:3}] }
            ]}
        ],
        calc: function(answers) {
            let total = 0; let detail = [];
            this.sections.forEach(s => {
                s.items.forEach(item => {
                    let score = answers[item.text] || 0;
                    total += score; detail.push({icon:item.icon, name:item.text, score, max:item.opts[item.opts.length-1].s});
                });
            });
            let level,lvlClass;
            if(total>=17){level='认知功能正常';lvlClass='good'}
            else if(total>=13){level='轻度认知障碍';lvlClass='mid'}
            else if(total>=8){level='中度认知障碍';lvlClass='warn'}
            else{level='重度认知障碍';lvlClass='severe'}
            return {total, max:20, level, lvlClass, detail};
        }
    },
    speech: {
        id: 'speech', chapter: 6, icon: '🗣️', name: '言语-语言功能评定',
        desc: '言语和语言功能筛查，评估口语表达、理解、复述、命名等方面。',
        sections: [{ title: '言语功能评估', items: [
            { icon:'💬', text:'自发言语：患者能否自发表达意愿', opts:[{t:'完全不能',s:0},{t:'仅能说单词',s:1},{t:'能说短句(有语法错误)',s:2},{t:'基本正常',s:3}] },
            { icon:'👂', text:'听理解：执行一步指令（如"请闭眼"）', opts:[{t:'不能',s:0},{t:'需重复才能执行',s:1},{t:'一次即能执行',s:2}] },
            { icon:'🔁', text:'复述：复述"天安门"、"五星红旗"', opts:[{t:'不能',s:0},{t:'部分正确',s:1},{t:'完全正确',s:2}] },
            { icon:'🏷️', text:'命名：命名常见物品（手机、钥匙、杯子）', opts:[{t:'0个',s:0},{t:'1个',s:1},{t:'2个',s:2},{t:'3个',s:3}] },
            { icon:'📖', text:'阅读：朗读并理解简单句子', opts:[{t:'不能',s:0},{t:'能朗读不理解',s:1},{t:'能理解',s:2}] },
            { icon:'✍️', text:'书写：书写姓名、地址', opts:[{t:'不能',s:0},{t:'可写部分',s:1},{t:'可完整书写',s:2}] },
            { icon:'📞', text:'口语表达：描述图片内容或讲述事件', opts:[{t:'不能',s:0},{t:'需提示',s:1},{t:'基本独立但欠流利',s:2},{t:'流利准确',s:3}] }
        ]}],
        calc: function(answers) {
            let total = 0; let detail = [];
            this.sections[0].items.forEach(item => {
                let score = answers[item.text] || 0;
                total += score; detail.push({icon:item.icon, name:item.text, score, max:item.opts[item.opts.length-1].s});
            });
            let level,lvlClass;
            if(total>=14){level='言语功能基本正常';lvlClass='good'}
            else if(total>=9){level='轻度言语障碍';lvlClass='mid'}
            else if(total>=4){level='中度言语障碍';lvlClass='warn'}
            else{level='重度言语障碍';lvlClass='severe'}
            return {total, max:17, level, lvlClass, detail};
        }
    },
    sensory: {
        id: 'sensory', chapter: 7, icon: '👆', name: '感觉功能评定',
        desc: '感觉功能筛查，评估浅感觉、深感觉和复合感觉。',
        sections: [
            { title: '浅感觉', items: [
                { icon:'🪡', text:'痛觉：用针尖轻刺皮肤，能否正确判断', opts:[{t:'消失',s:0},{t:'减退/过敏',s:1},{t:'正常',s:2}] },
                { icon:'🌡️', text:'温度觉：用冷/热水管接触皮肤，能否区分', opts:[{t:'消失',s:0},{t:'减退/过敏',s:1},{t:'正常',s:2}] },
                { icon:'🖐️', text:'触觉：用棉絮轻触皮肤，能否感知', opts:[{t:'消失',s:0},{t:'减退/过敏',s:1},{t:'正常',s:2}] }
            ]},
            { title: '深感觉', items: [
                { icon:'🦶', text:'运动觉：被动活动手指/脚趾，能否判断方向', opts:[{t:'消失',s:0},{t:'减退',s:1},{t:'正常',s:2}] },
                { icon:'📍', text:'位置觉：将肢体置于某位置，能否准确描述', opts:[{t:'消失',s:0},{t:'减退',s:1},{t:'正常',s:2}] },
                { icon:'📳', text:'振动觉：用音叉置于骨突处，能否感知振动', opts:[{t:'消失',s:0},{t:'减退',s:1},{t:'正常',s:2}] }
            ]},
            { title: '复合感觉', items: [
                { icon:'✏️', text:'两点辨别觉：指尖两点辨别阈值', opts:[{t:'>10mm/无法辨别',s:0},{t:'5-10mm',s:1},{t:'<5mm',s:2}] },
                { icon:'🔑', text:'实体觉：闭眼摸物（钥匙、硬币、笔）并说出名称', opts:[{t:'0个',s:0},{t:'1-2个',s:1},{t:'3个',s:2}] },
                { icon:'✍️', text:'图形觉：在皮肤上写数字，能否辨识', opts:[{t:'不能',s:0},{t:'部分正确',s:1},{t:'完全正确',s:2}] }
            ]}
        ],
        calc: function(answers) {
            let total = 0; let detail = [];
            this.sections.forEach(s => {
                s.items.forEach(item => {
                    let score = answers[item.text] || 0;
                    total += score; detail.push({icon:item.icon, name:item.text, score, max:item.opts[item.opts.length-1].s});
                });
            });
            let level,lvlClass;
            if(total>=15){level='感觉功能正常';lvlClass='good'}
            else if(total>=10){level='轻度感觉障碍';lvlClass='mid'}
            else if(total>=5){level='中度感觉障碍';lvlClass='warn'}
            else{level='重度感觉障碍';lvlClass='severe'}
            return {total, max:18, level, lvlClass, detail};
        }
    },
    tone: {
        id: 'tone', chapter: 8, icon: '🎯', name: '肌张力评定（改良Ashworth）',
        desc: '改良Ashworth量表（MAS）用于评估肌张力增高的程度，适用于中枢神经系统损伤患者。',
        sections: [{ title: '肌张力评定（改良Ashworth分级）', items: [
            { icon:'💪', text:'肌张力总体评价', opts:[
                {t:'0级：无肌张力增高',s:0},
                {t:'1级：肌张力轻度增加（被动活动时有卡住感）',s:1},
                {t:'1+级：肌张力轻度增加（有卡住感+轻微阻力）',s:2},
                {t:'2级：肌张力明显增加（活动范围大部分有阻力）',s:3},
                {t:'3级：肌张力严重增高（被动活动困难）',s:4},

        calc: function(answers) {
            let total = answers['肌张力总体评价'] || 0;

            return {total, max:5, level, lvlClass, detail:[{icon:'💪',name:'改良Ashworth分级',score:total,max:5}]};
        }
    },
    mmt: {
        id: 'mmt', chapter: 9, icon: '💪', name: '肌力评定（MMT）',
        desc: '徒手肌力检查（Manual Muscle Testing, MMT），采用Lovett 6级分级法，评估主要肌群肌力。',
        sections: [
            { title: '上肢肌群', items: [

                { icon:'💪', text:'肘关节屈曲（肱二头肌）', opts:[{t:'0级',s:0},{t:'1级',s:1},{t:'2级',s:2},{t:'3级',s:3},{t:'4级',s:4},{t:'5级',s:5}] },
                { icon:'💪', text:'肘关节伸展（肱三头肌）', opts:[{t:'0级',s:0},{t:'1级',s:1},{t:'2级',s:2},{t:'3级',s:3},{t:'4级',s:4},{t:'5级',s:5}] },
                { icon:'✊', text:'握力（指屈肌）', opts:[{t:'0级',s:0},{t:'1级',s:1},{t:'2级',s:2},{t:'3级',s:3},{t:'4级',s:4},{t:'5级',s:5}] }
            ]},
            { title: '下肢肌群', items: [
                { icon:'🦵', text:'髋关节屈曲（髂腰肌）', opts:[{t:'0级',s:0},{t:'1级',s:1},{t:'2级',s:2},{t:'3级',s:3},{t:'4级',s:4},{t:'5级',s:5}] },
                { icon:'🦵', text:'膝关节伸展（股四头肌）', opts:[{t:'0级',s:0},{t:'1级',s:1},{t:'2级',s:2},{t:'3级',s:3},{t:'4级',s:4},{t:'5级',s:5}] },
                { icon:'🦶', text:'踝关节背屈（胫前肌）', opts:[{t:'0级',s:0},{t:'1级',s:1},{t:'2级',s:2},{t:'3级',s:3},{t:'4级',s:4},{t:'5级',s:5}] }

            { title: '躯干肌群', items: [
                { icon:'🧍', text:'腹肌（仰卧起坐）', opts:[{t:'0级',s:0},{t:'1级',s:1},{t:'2级',s:2},{t:'3级',s:3},{t:'4级',s:4},{t:'5级',s:5}] }

        calc: function(answers) {

            this.sections.forEach(s => {

                });

            let avg = (total / count).toFixed(1);
            let level,lvlClass;
            if(avg>=4){level='肌力基本正常';lvlClass='good'}
            else if(avg>=3){level='肌力中度减退';lvlClass='mid'}
            else if(avg>=2){level='肌力明显减退';lvlClass='warn'}
            else if(avg>=1){level='肌力重度减退';lvlClass='bad'}
            else{level='完全瘫痪';lvlClass='severe'}

    },
    rom: {
        id: 'rom', chapter: 10, icon: '🦵', name: '关节活动度评定',
        desc: '评估各主要关节的活动范围（Range of Motion, ROM），判断是否存在关节活动受限。',
        sections: [{ title: '主要关节活动度', items: [
            { icon:'🔄', text:'肩关节前屈（正常0-180°）', opts:[{t:'>150°（正常或轻度受限）',s:2},{t:'90-150°（中度受限）',s:1},{t:'<90°（严重受限）',s:0}] },
            { icon:'🔄', text:'肩关节外展（正常0-180°）', opts:[{t:'>150°',s:2},{t:'90-150°',s:1},{t:'<90°',s:0}] },
            { icon:'🔄', text:'肘关节屈伸（正常0-145°）', opts:[{t:'>120°',s:2},{t:'60-120°',s:1},{t:'<60°',s:0}] },
            { icon:'🔄', text:'腕关节屈伸（正常0-150°）', opts:[{t:'>120°',s:2},{t:'60-120°',s:1},{t:'<60°',s:0}] },
            { icon:'🔄', text:'髋关节屈曲（正常0-125°）', opts:[{t:'>100°',s:2},{t:'60-100°',s:1},{t:'<60°',s:0}] },
            { icon:'🔄', text:'膝关节屈伸（正常0-135°）', opts:[{t:'>110°',s:2},{t:'60-110°',s:1},{t:'<60°',s:0}] },
            { icon:'🔄', text:'踝关节背屈/跖屈（正常0-50°）', opts:[{t:'>40°',s:2},{t:'20-40°',s:1},{t:'<20°',s:0}] }
        ]}],
        calc: function(answers) {

                total += score; detail.push({icon:item.icon, name:item.text, score, max:2});
            });
            let level,lvlClass;
            if(total>=12){level='关节活动度基本正常';lvlClass='good'}
            else if(total>=8){level='轻度活动受限';lvlClass='mid'}
            else if(total>=4){level='中度活动受限';lvlClass='warn'}
            else{level='重度活动受限';lvlClass='severe'}
            return {total, max:14, level, lvlClass, detail};
        }
    },
    balance: {
        id: 'balance', chapter: 11, icon: '⚖️', name: '协调与平衡功能评定',
        desc: '评估协调功能和平衡能力，包括Berg平衡量表核心项目和协调功能测试。',
        sections: [
            { title: '平衡功能', items: [
                { icon:'🧍', text:'坐→站起：能否独立从坐位站起', opts:[{t:'不能',s:0},{t:'需大量帮助',s:1},{t:'需少量帮助',s:2},{t:'独立完成',s:3}] },
                { icon:'🧍', text:'无支撑站立：能否独立站立2分钟', opts:[{t:'不能',s:0},{t:'<30秒',s:1},{t:'30秒-2分钟',s:2},{t:'>2分钟',s:3}] },
                { icon:'🪑', text:'无支撑坐位：能否坐2分钟（靠背不靠腿）', opts:[{t:'不能',s:0},{t:'需支撑',s:1},{t:'能坐<2分钟',s:2},{t:'能坐>2分钟',s:3}] },
                { icon:'⬇️', text:'站→坐：能否安全坐下', opts:[{t:'不能',s:0},{t:'需帮助',s:1},{t:'需手扶',s:2},{t:'安全独立',s:3}] },
                { icon:'🔄', text:'转身360°：能否平稳转身', opts:[{t:'不能',s:0},{t:'需提示',s:1},{t:'平稳但慢',s:2},{t:'平稳流畅',s:3}] },
                { icon:'👀', text:'闭眼站立：闭眼站立10秒', opts:[{t:'不能',s:0},{t:'<3秒',s:1},{t:'3-10秒',s:2},{t:'>10秒',s:3}] },
                { icon:'📏', text:'串联站立：双脚一前一后站立', opts:[{t:'不能',s:0},{t:'需扶持',s:1},{t:'能但<30秒',s:2},{t:'>30秒',s:3}] }
            ]},
            { title: '协调功能', items: [
                { icon:'👈', text:'指鼻试验：食指从远距离指向鼻尖', opts:[{t:'无法完成',s:0},{t:'有明显震颤',s:1},{t:'轻度不准确',s:2},{t:'准确流畅',s:3}] },
                { icon:'🦶', text:'跟膝胫试验：足跟沿对侧胫骨下滑', opts:[{t:'无法完成',s:0},{t:'明显不稳',s:1},{t:'轻度不稳',s:2},{t:'准确流畅',s:3}] },
                { icon:'🔄', text:'快复轮替试验：快速交替翻转手掌', opts:[{t:'无法完成',s:0},{t:'明显节律异常',s:1},{t:'轻度异常',s:2},{t:'正常',s:3}] },
                { icon:'👐', text:'指指试验：两食指相对', opts:[{t:'无法完成',s:0},{t:'明显偏差',s:1},{t:'轻度偏差',s:2},{t:'准确',s:3}] }
            ]}
        ],
        calc: function(answers) {
            let total = 0; let detail = [];
            this.sections.forEach(s => {
                s.items.forEach(item => {
                    let score = answers[item.text] || 0;
                    total += score; detail.push({icon:item.icon, name:item.text, score, max:item.opts[item.opts.length-1].s});

            let level,lvlClass;
            if(total>=30){level='协调与平衡功能正常';lvlClass='good'}

// ================================================================
// 状态
// ================================================================
let currentScale = null;
let answers = {};

// ================================================================
// 渲染侧边导航
// ================================================================
function renderSidebar() {
    const nav = document.getElementById('sidebarNav');
    let html = '<div class="nav-group-label">评估量表</div>';
    const keys = Object.keys(SCALES);
    keys.forEach(key => {
        const s = SCALES[key];
        html += `<button class="nav-item" onclick="selectScale('${key}')" id="nav_${key}">
            <span class="nav-icon">${s.icon}</span>
            <span>${s.name}</span>
            <span class="nav-badge" id="badge_${key}">${s.chapter}章</span>
        </button>`;
    });
    nav.innerHTML = html;
}

// ================================================================
// 选择量表
// ================================================================
function selectScale(key) {
    currentScale = key;
    const s = SCALES[key];
    answers = {};

    // 更新导航高亮
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('nav_' + key).classList.add('active');
    document.getElementById('topbarTitle').textContent = s.icon + ' ' + s.name;
    document.getElementById('topbarStatus').textContent = '第' + s.chapter + '章';

    // 渲染问卷页
    renderQuestionPage(s);
    closeSidebar();
}

// ================================================================
// 渲染问卷
// ================================================================
function renderQuestionPage(s) {
    const container = document.getElementById('pageContainer');
    let html = `
        <div class="section-intro">
            <h3>📌 ${s.name} - 评估说明</h3>
            <p>${s.desc} 请根据患者实际表现，在每一项中选择最符合的选项。</p>
        </div>
        <div id="questionsContainer"></div>
        <div class="bottom-bar">
            <span class="progress-text" id="progressText">已作答：<strong>0</strong> / <strong id="totalQCount">0</strong> 项</span>
            <button class="btn btn-primary" id="btnSubmit" onclick="submitAssessment()" disabled>✅ 提交评估 →</button>
        </div>
    `;
    container.innerHTML = html;

    let qHtml = '';
    let totalQ = 0;
    s.sections.forEach((section, si) => {
        qHtml += `<div style="font-size:14px;font-weight:600;color:#1a365d;margin:16px 0 10px;">${section.title}</div>`;
        section.items.forEach(item => {
            totalQ++;
            const optHtml = item.opts.map((opt, oi) => `
                <label class="option-item" onclick="selectOption('${s.id}', '${item.text.replace(/'/g,"\\'")}', ${opt.s}, this)">
                    <input type="radio" name="q_${s.id}_${item.text}" value="${opt.s}">
                    <span class="custom-radio"></span>
                    <span class="option-text">${opt.t}</span>
                    <span class="option-score">${opt.s} 分</span>
                </label>
            `).join('');
            qHtml += `
                <div class="question-card" id="card_${s.id}_${totalQ}">
                    <div class="question-header">
                        <span class="q-num">${totalQ}</span>
                        <span class="q-text">${item.text}</span>
                        <span class="q-icon">${item.icon}</span>
                    </div>
                    <div class="options-group">${optHtml}</div>
                </div>
            `;
        });
    });
    document.getElementById('questionsContainer').innerHTML = qHtml;
    document.getElementById('totalQCount').textContent = totalQ;
    document.getElementById('progressText').innerHTML = `已作答：<strong>0</strong> / <strong>${totalQ}</strong> 项`;
}

// ================================================================
// 选择选项
// ================================================================
function selectOption(sId, qText, score, labelEl) {
    if (!answers[sId]) answers[sId] = {};
    answers[sId][qText] = score;

    const card = labelEl.closest('.question-card');
    card.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
    labelEl.classList.add('selected');
    labelEl.querySelector('input[type="radio"]').checked = true;
    card.classList.add('answered');

    updateProgress(sId);
}

function updateProgress(sId) {
    if (!answers[sId]) return;
    const count = Object.keys(answers[sId]).length;
    const total = countTotalQuestions(sId);
    document.getElementById('progressText').innerHTML = `已作答：<strong>${count}</strong> / <strong>${total}</strong> 项`;
    document.getElementById('btnSubmit').disabled = count < total;
}

function countTotalQuestions(sId) {
    let n = 0;
    SCALES[sId].sections.forEach(s => n += s.items.length);
    return n;
}

// ================================================================
// 提交评估
// ================================================================
function submitAssessment() {
    const s = SCALES[currentScale];
    const ans = answers[currentScale] || {};
    if (Object.keys(ans).length < countTotalQuestions(currentScale)) return;

    const result = s.calc(ans);
    localStorage.setItem('rehab_' + currentScale + '_answers', JSON.stringify(ans));
    localStorage.setItem('rehab_' + currentScale + '_result', JSON.stringify(result));

    renderResultPage(s, result);
}

// ================================================================
// 渲染结果页
// ================================================================
function renderResultPage(s, result) {
    const container = document.getElementById('pageContainer');
    let detailHtml = result.detail.map((d, i) => {
        const pct = d.max > 0 ? (d.score / d.max) * 100 : 0;
        return `
            <div class="score-row">
                <span class="sr-index">${i+1}</span>
                <span class="sr-icon">${d.icon}</span>
                <span class="sr-name">${d.name}</span>
                <span class="sr-score">${d.score}</span>
                <span class="sr-max">/ ${d.max}</span>
                <div class="sr-bar-bg"><div class="sr-bar-fill" style="width:${pct}%"></div></div>
            </div>
        `;
    }).join('');

    container.innerHTML = `
        <div class="result-hero">
            <div class="score-label">${s.name} · 总分</div>
            <div class="score-number">${result.total}</div>
            <div style="font-size:12px;opacity:.7;">/ ${result.max} 分</div>
            <div class="score-level ${result.lvlClass}">${result.level}</div>
        </div>
        <div class="score-detail-title">📊 各项得分明细</div>
        <div class="score-table">${detailHtml}</div>
        <div class="result-actions">
            <button class="btn btn-outline" onclick="selectScale('${s.id}')">← 返回重新评估</button>
            <button class="btn btn-primary" onclick="selectScaleByIndex(0)">📋 切换其他量表</button>
        </div>
    `;
    document.getElementById('topbarStatus').textContent = result.total + '/' + result.max + '分';

    // 更新导航栏标记
    const badge = document.getElementById('badge_' + s.id);
    if (badge) badge.textContent = result.total + '分';
}

// ================================================================
// 辅助导航
// ================================================================
function selectScaleByIndex(idx) {
    const keys = Object.keys(SCALES);
    if (idx < keys.length) selectScale(keys[idx]);
}

// ================================================================
// 恢复已保存数据
// ================================================================
function loadSavedData() {
    const keys = Object.keys(SCALES);
    keys.forEach(key => {
        const saved = localStorage.getItem('rehab_' + key + '_result');
        if (saved) {
            const result = JSON.parse(saved);
            const badge = document.getElementById('badge_' + key);
            if (badge) badge.textContent = result.total + '分';
        }
    });
}

// ================================================================
// 侧栏控制
// ================================================================
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
}
function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('show');
}

// ================================================================
// 初始化
// ================================================================
window.addEventListener('DOMContentLoaded', function() {
    renderSidebar();
    // 默认选中第一个（Barthel）
    selectScale('barthel');
    loadSavedData();
});
</script>

</html>
